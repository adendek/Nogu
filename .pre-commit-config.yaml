repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1 # Use latest version
    hooks:
          - id: ruff
            args: [ --fix ]
          - id: ruff-format


  - repo: https://github.com/asottile/blacken-docs
    rev: 1.19.1
    hooks:
      - id: blacken-docs
        additional_dependencies: ["black==24.3.0"]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.6.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.7.0
    hooks:
      - id: nbqa-isort
        args: ["--profile=black"]
      - id: nbqa-black
        args:
          - "--unstable"  # match black configuration
          - "--target-version=py312"
        additional_dependencies: ["black==24.3.0"]
      - id: nbqa-flake8
        # F821 - Ignore undefined name error for dbutils kind of modules.
        # E501 - Line too long
        # W291 - Trailing whitespace
        args: ["--extend-ignore=F821,W291,E501"]

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: python-check-mock-methods
      - id: python-no-log-warn
      - id: rst-backticks
      - id: rst-directive-colons
        types: [text]
      - id: rst-inline-touching-normal
        types: [text]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=800] # 800 kb to be able to hold df for E2E tests.
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: [ --unsafe ]
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ^LICENSE|\.(html|csv|txt|svg|py)$
      - id: pretty-format-json
        args: ["--autofix", "--no-ensure-ascii", "--no-sort-keys"]
        exclude: \.ipynb$
      - id: requirements-txt-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: \.(html|svg)$

  - repo: https://github.com/asottile/setup-cfg-fmt
    rev: v2.4.0
    hooks:
      - id: setup-cfg-fmt

  - repo: https://github.com/PyCQA/docformatter
    # See: https://github.com/PyCQA/docformatter/issues/293
    rev: eb1df347edd128b30cd3368dddc3aa65edcfac38
    hooks:
      - id: docformatter
        files: ^foresight/.*\.py$
        args:
          - --in-place
          - --black
          - --recursive
          - --close-quotes-on-newline
          - --style=google

  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: "notebooks/__init__.py"
        # See https://www.pydocstyle.org/en/stable/error_codes.html
        # D205 and D415 clashes with black line length constraints.
        args: ["--convention=google", "--add-ignore=D100,D104,D105,D107,D205,D415"]

  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        files: ^foresight/.*\.py$
        entry: pflake8 --config=pyproject.toml
        additional_dependencies:
          - flake8-2020
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-docstrings
          - flake8-implicit-str-concat
          - pyproject-flake8
exclude: "notebooks"
