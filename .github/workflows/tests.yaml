# Regular tests
#
# Use this to ensure your tests are passing on every push and PR
#
# The workflow performs the following steps:
# 1. Install UV.
# 2. Sync the env using `uv sync` .
# 3. Runs unit tests.
# 4. Runs end-to-end tests.

name: 'Unit and E2E tests'

on:
  pull_request:
  workflow_dispatch:

jobs:
  UT:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
    env:
      OS: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
    - name: System information
      run: python .github/workflows/system_info.py

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install the project
      run: uv sync --all-extras --dev

    - name: Run UT and get coverage
      run: |
         uv run  pytest -k "not e2e"


  E2E:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-22.04 ]
    env:
      OS: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: System information
        run: python .github/workflows/system_info.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run UT and get coverage
        run: |
          uv run  pytest -k "e2e"
